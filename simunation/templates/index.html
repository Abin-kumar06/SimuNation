<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuNation — Emergent AI Civilization Simulator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: rgba(22, 30, 49, 0.7);
            --bg-input: #111827;
            --border-glow: rgba(99, 102, 241, 0.15);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-title: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-logo {
            font-size: 2rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            animation: pulse 2.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(99, 102, 241, 0.3); }
            100% { transform: scale(1.05); text-shadow: 0 0 20px rgba(99, 102, 241, 0.7); }
        }

        h1 {
            font-family: var(--font-title);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-badge {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        main {
            flex: 1;
            padding: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        /* Glassmorphic cards */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            border-color: var(--border-glow);
            box-shadow: 0 10px 35px 0 rgba(99, 102, 241, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
        }

        .card-title {
            font-family: var(--font-title);
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Control Panel */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .btn {
            font-family: var(--font-main);
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            background: rgba(16, 185, 129, 0.25);
        }

        .btn-full {
            grid-column: span 2;
        }

        /* Config sliders */
        .control-group {
            margin-bottom: 1rem;
        }

        .control-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
            color: var(--text-secondary);
        }

        .control-val {
            font-weight: 600;
            color: var(--accent);
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-input);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Status Panels */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-family: var(--font-title);
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* Main Display Section */
        .dashboard-content {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Tabs */
        .tabs-header {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: var(--font-main);
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .chart-container {
            position: relative;
            height: 320px;
            width: 100%;
        }

        /* Console styling */
        .console-logs {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            height: 220px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .log-item {
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            padding-bottom: 2px;
        }

        .log-item.shortage { color: var(--danger); }
        .log-item.warning { color: var(--warning); }
        .log-item.success { color: var(--success); }
        .log-item.info { color: var(--info); }
        .log-item.timestep { color: var(--text-primary); font-weight: bold; border-top: 1px solid var(--border-color); margin-top: 5px; padding-top: 5px; }

        /* Agent Grid UI */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 0.75rem;
            max-height: 500px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .agent-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            font-size: 0.7rem;
            transition: all 0.2s ease;
            position: relative;
        }

        .agent-badge:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        .agent-badge.dead {
            opacity: 0.4;
            background: rgba(239, 68, 68, 0.05);
            border-color: rgba(239, 68, 68, 0.15);
        }

        .agent-badge.starving {
            border-color: var(--warning);
            box-shadow: 0 0 5px rgba(245, 158, 11, 0.2);
        }

        .agent-role-icon {
            font-size: 1.1rem;
        }

        .role-Farmer { color: var(--success); }
        .role-Laborer { color: var(--info); }
        .role-Merchant { color: var(--warning); }

        .agent-id {
            font-weight: bold;
            color: var(--text-primary);
        }

        .agent-money {
            color: #10b981;
            font-weight: 500;
        }

        .agent-food {
            color: #38bdf8;
            font-weight: 500;
        }

        /* Tooltip style */
        .tooltip {
            visibility: hidden;
            background-color: #0b0f19;
            color: #fff;
            text-align: left;
            border-radius: 6px;
            padding: 0.5rem;
            position: absolute;
            z-index: 10;
            width: 140px;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.7rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .agent-badge:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title-container">
            <i class="fa-solid fa-network-wired header-logo"></i>
            <div>
                <h1>SimuNation</h1>
                <span style="font-size: 0.75rem; color: var(--text-secondary);">Emergent AI Civilization Simulator</span>
            </div>
        </div>
        <div class="header-title-container">
            <span class="header-badge" id="step-indicator">Timestep: 0</span>
        </div>
    </header>

    <main>
        <!-- Sidebar Controls -->
        <div class="sidebar">
            <div class="card">
                <div class="card-header">
                    <span class="card-title"><i class="fa-solid fa-sliders"></i> Simulation Controls</span>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" id="btn-step"><i class="fa-solid fa-forward-step"></i> Step 1</button>
                    <button class="btn btn-secondary" id="btn-step10"><i class="fa-solid fa-angles-right"></i> Step 10</button>
                    <button class="btn btn-success btn-full" id="btn-play"><i class="fa-solid fa-play"></i> Auto Step</button>
                    <button class="btn btn-danger btn-full" id="btn-reset"><i class="fa-solid fa-arrows-rotate"></i> Reset Simulation</button>
                </div>

                <div style="margin-top: 1.5rem;">
                    <span class="card-title" style="font-size: 0.95rem; margin-bottom: 0.75rem;"><i class="fa-solid fa-scale-balanced"></i> Dynamic Policy</span>
                    
                    <div class="control-group">
                        <div class="control-label-row">
                            <span>Tax Rate</span>
                            <span class="control-val" id="val-tax">5%</span>
                        </div>
                        <input type="range" id="input-tax" min="0" max="30" value="5">
                    </div>

                    <div class="control-group">
                        <div class="control-label-row">
                            <span>Welfare Money Trigger</span>
                            <span class="control-val" id="val-welfare-money">$10</span>
                        </div>
                        <input type="range" id="input-welfare-money" min="0" max="50" value="10">
                    </div>

                    <div class="control-group">
                        <div class="control-label-row">
                            <span>Welfare Food Trigger</span>
                            <span class="control-val" id="val-welfare-food">2.0</span>
                        </div>
                        <input type="range" id="input-welfare-food" min="0.0" max="10.0" step="0.5" value="2.0">
                    </div>
                    
                    <button class="btn btn-secondary btn-full" id="btn-apply-config" style="margin-top: 0.5rem; font-size: 0.8rem; padding: 0.5rem;">
                        <i class="fa-solid fa-check"></i> Apply Policies
                    </button>
                </div>
            </div>

            <div class="card" style="flex: 1; display: flex; flex-direction: column;">
                <div class="card-header">
                    <span class="card-title"><i class="fa-solid fa-terminal"></i> Simulation Log</span>
                </div>
                <div class="console-logs" id="console-logs">
                    <!-- Logs populated here -->
                </div>
            </div>
        </div>

        <!-- Main Display -->
        <div class="dashboard-content">
            <!-- Stats Row -->
            <div class="stats-grid">
                <div class="stat-card" style="border-left: 4px solid var(--accent)">
                    <span class="stat-label">Active Population</span>
                    <span class="stat-value" id="stat-pop-alive">0</span>
                </div>
                <div class="stat-card" style="border-left: 4px solid var(--warning)">
                    <span class="stat-label">Starving</span>
                    <span class="stat-value" id="stat-pop-starving">0</span>
                </div>
                <div class="stat-card" style="border-left: 4px solid var(--danger)">
                    <span class="stat-label">Deceased</span>
                    <span class="stat-value" id="stat-pop-dead">0</span>
                </div>
                <div class="stat-card" style="border-left: 4px solid var(--success)">
                    <span class="stat-label">Avg Food Price</span>
                    <span class="stat-value" id="stat-avg-price">$10.00</span>
                </div>
                <div class="stat-card" style="border-left: 4px solid var(--info)">
                    <span class="stat-label">Gini Coefficient</span>
                    <span class="stat-value" id="stat-gini">0.00</span>
                </div>
            </div>

            <!-- Tabs/Graphs card -->
            <div class="card">
                <div class="tabs-header">
                    <button class="tab-btn active" onclick="switchTab('tab-charts')"><i class="fa-solid fa-chart-line"></i> Economy Trends</button>
                    <button class="tab-btn" onclick="switchTab('tab-agents')"><i class="fa-solid fa-users"></i> Civilization Grid</button>
                </div>

                <div class="tab-content active" id="tab-charts">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="chart-container">
                            <canvas id="priceChart"></canvas>
                        </div>
                        <div class="chart-container">
                            <canvas id="giniChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="tab-agents">
                    <div class="agent-grid" id="agent-grid">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isAutoStepping = false;
        let autoStepInterval = null;
        
        // Charts declarations
        let priceChartInstance = null;
        let giniChartInstance = null;

        // Initialize empty charts
        function initCharts() {
            const ctxPrice = document.getElementById('priceChart').getContext('2d');
            priceChartInstance = new Chart(ctxPrice, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Average Food Price ($)',
                        data: [],
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#f3f4f6' } }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#9ca3af' } },
                        y: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#9ca3af' } }
                    }
                }
            });

            const ctxGini = document.getElementById('giniChart').getContext('2d');
            giniChartInstance = new Chart(ctxGini, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Gini Inequality Coefficient (0-1)',
                            data: [],
                            borderColor: '#6366f1',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            fill: true,
                            tension: 0.3,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Total Food Supply',
                            data: [],
                            borderColor: '#38bdf8',
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.2,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#f3f4f6' } }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#9ca3af' } },
                        y: { 
                            grid: { color: 'rgba(255, 255, 255, 0.05)' }, 
                            ticks: { color: '#9ca3af' },
                            position: 'left'
                        },
                        y1: {
                            grid: { drawOnChartArea: false },
                            ticks: { color: '#9ca3af' },
                            position: 'right'
                        }
                    }
                }
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Set current active
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        async function fetchState() {
            try {
                const response = await fetch('/api/state');
                const data = await response.json();
                
                // Update stats
                document.getElementById('step-indicator').innerText = `Timestep: ${data.stats.timestep}`;
                document.getElementById('stat-pop-alive').innerText = data.stats.population_alive;
                document.getElementById('stat-pop-starving').innerText = data.stats.population_starving;
                document.getElementById('stat-pop-dead').innerText = data.stats.population_dead;
                document.getElementById('stat-avg-price').innerText = `$${data.stats.average_food_price.toFixed(2)}`;
                document.getElementById('stat-gini').innerText = data.stats.gini_coefficient.toFixed(3);
                
                // Update dynamic values in control panel inputs if initialized
                document.getElementById('val-tax').innerText = `${Math.round(data.config.tax_rate * 100)}%`;
                document.getElementById('val-welfare-money').innerText = `$${data.config.welfare_threshold_money}`;
                document.getElementById('val-welfare-food').innerText = data.config.welfare_threshold_food;

                // Update Logs
                const logConsole = document.getElementById('console-logs');
                logConsole.innerHTML = '';
                data.logs.forEach(log => {
                    const item = document.createElement('div');
                    item.className = 'log-item';
                    if (log.startsWith('---')) {
                        item.classList.add('timestep');
                    } else if (log.includes('shortage')) {
                        item.classList.add('shortage');
                    } else if (log.includes('starving') || log.includes('died') || log.includes('💀')) {
                        item.classList.add('warning');
                    } else if (log.includes('bought') || log.includes('🤝')) {
                        item.classList.add('success');
                    } else if (log.includes('Govt') || log.includes('🏛️')) {
                        item.classList.add('info');
                    }
                    item.innerText = log;
                    logConsole.appendChild(item);
                });
                logConsole.scrollTop = logConsole.scrollHeight;

                // Update Agent Grid
                const grid = document.getElementById('agent-grid');
                grid.innerHTML = '';
                
                const allAgents = [...data.living_agents, ...data.dead_agents];
                allAgents.forEach(agent => {
                    const badge = document.createElement('div');
                    badge.className = 'agent-badge';
                    if (!agent.is_alive) badge.classList.add('dead');
                    if (agent.starvation_steps > 0) badge.classList.add('starving');
                    
                    let roleIcon = 'fa-user';
                    if (agent.role === 'Farmer') roleIcon = 'fa-wheat-awn';
                    else if (agent.role === 'Laborer') roleIcon = 'fa-hammer';
                    else if (agent.role === 'Merchant') roleIcon = 'fa-shop';

                    badge.innerHTML = `
                        <i class="fa-solid ${roleIcon} agent-role-icon role-${agent.role}"></i>
                        <span class="agent-id">#${agent.id}</span>
                        <span class="agent-money">$${agent.money.toFixed(1)}</span>
                        <span class="agent-food">${agent.food.toFixed(1)} food</span>
                        <div class="tooltip">
                            <strong>Agent #${agent.id}</strong><br>
                            Role: ${agent.role}<br>
                            Personality: ${agent.personality}<br>
                            Status: ${agent.is_alive ? (agent.starvation_steps > 0 ? 'Starving' : 'Alive') : 'Dead'}<br>
                            Value Est: $${agent.perceived_value.toFixed(1)}<br>
                            Action: ${agent.last_action}
                        </div>
                    `;
                    grid.appendChild(badge);
                });

                // Update charts
                const labels = data.history.map(h => h.timestep);
                const prices = data.history.map(h => h.average_food_price);
                const ginis = data.history.map(h => h.gini_coefficient);
                const foods = data.history.map(h => h.total_food);

                priceChartInstance.data.labels = labels;
                priceChartInstance.data.datasets[0].data = prices;
                priceChartInstance.update();

                giniChartInstance.data.labels = labels;
                giniChartInstance.data.datasets[0].data = ginis;
                giniChartInstance.data.datasets[1].data = foods;
                giniChartInstance.update();

            } catch (err) {
                console.error("Error fetching state:", err);
            }
        }

        async function stepSim(count) {
            const response = await fetch(`/api/step?count=${count}`, { method: 'POST' });
            await fetchState();
        }

        async function resetSim() {
            if (confirm("Reset civilization simulation?")) {
                const response = await fetch('/api/reset', { method: 'POST' });
                await fetchState();
            }
        }

        async function applyPolicies() {
            const tax = parseFloat(document.getElementById('input-tax').value) / 100;
            const wMoney = parseFloat(document.getElementById('input-welfare-money').value);
            const wFood = parseFloat(document.getElementById('input-welfare-food').value);
            
            // Get current base config params to send required schema
            const stateResp = await fetch('/api/state');
            const stateData = await stateResp.json();
            
            const configUpdate = {
                tax_rate: tax,
                welfare_threshold_money: wMoney,
                welfare_threshold_food: wFood,
                farmer_food_production_per_step: stateData.config.farmer_food_production_per_step,
                laborer_wage_per_step: stateData.config.laborer_wage_per_step
            };

            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(configUpdate)
            });
            
            alert("Government policies applied successfully!");
            await fetchState();
        }

        // Play/Pause auto stepping
        document.getElementById('btn-play').addEventListener('click', () => {
            const btn = document.getElementById('btn-play');
            if (isAutoStepping) {
                isAutoStepping = false;
                clearInterval(autoStepInterval);
                btn.innerHTML = `<i class="fa-solid fa-play"></i> Auto Step`;
                btn.className = "btn btn-success btn-full";
            } else {
                isAutoStepping = true;
                autoStepInterval = setInterval(() => stepSim(1), 1000);
                btn.innerHTML = `<i class="fa-solid fa-pause"></i> Pause Autoplay`;
                btn.className = "btn btn-warning btn-full";
            }
        });

        // Event Listeners for inputs to show visual progress values instantly
        document.getElementById('input-tax').addEventListener('input', (e) => {
            document.getElementById('val-tax').innerText = `${e.target.value}%`;
        });
        document.getElementById('input-welfare-money').addEventListener('input', (e) => {
            document.getElementById('val-welfare-money').innerText = `$${e.target.value}`;
        });
        document.getElementById('input-welfare-food').addEventListener('input', (e) => {
            document.getElementById('val-welfare-food').innerText = parseFloat(e.target.value).toFixed(1);
        });

        document.getElementById('btn-step').addEventListener('click', () => stepSim(1));
        document.getElementById('btn-step10').addEventListener('click', () => stepSim(10));
        document.getElementById('btn-reset').addEventListener('click', resetSim);
        document.getElementById('btn-apply-config').addEventListener('click', applyPolicies);

        // Load page
        window.addEventListener('DOMContentLoaded', () => {
            initCharts();
            fetchState();
        });
    </script>
</body>
</html>
